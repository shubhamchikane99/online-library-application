<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Available Books</title>

	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f4f6f9;
			padding: 30px;
		}

		h2 {
			text-align: center;
			color: #4e73df;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 20px;
			background-color: white;
		}

		th,
		td {
			padding: 12px;
			border: 1px solid #ddd;
			text-align: center;
		}

		th {
			background-color: #4e73df;
			color: white;
		}

		tr:nth-child(even) {
			background-color: #f2f2f2;
		}

		.available {
			color: green;
			font-weight: bold;
		}

		.notavailable {
			color: red;
			font-weight: bold;
		}
	</style>
</head>

<body>

	<h2>Book Information</h2>

	<table>
		<thead>
			<tr>
				<th>Id</th>
				<th>Book Name</th>
				<th>Author</th>
				<th>Price</th>
				<th>Status</th>
			</tr>
		</thead>

		<tbody>
			<tr th:each="book, stat : ${bookList}">
				<td th:text="${stat.count}"></td>
				<td th:text="${book.name}"></td>
				<td th:text="${book.author}"></td>
				<td th:text="${book.price}"></td>

				<td th:text="${book.status == 1 ? 'Available' : 'Not Available'}"
					th:class="${book.status == 1 ? 'available' : 'notavailable'}">
				</td>
			</tr>
		</tbody>

	</table>

</body>

</html>
